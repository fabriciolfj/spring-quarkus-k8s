apiVersion: v1
kind: ConfigMap
metadata:
  name: sample-spring-k8s
data:
  application.properties: |
    management.endpoints.web.exposure.include = *
    management.endpoints.health.show-details = always
    management.endpoints.health.probes.enabled = true
    custom.property = test